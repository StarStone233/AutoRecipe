<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoRecipe</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-muted: #eef3f8;
        --text: #152033;
        --muted: #66758a;
        --line: #d7e0ea;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --ok: #16803c;
        --shadow: 0 8px 24px rgba(21, 32, 51, 0.10);
      }

      [data-theme="dark"] {
        --bg: #101418;
        --panel: #171d24;
        --panel-muted: #202832;
        --text: #f1f5f9;
        --muted: #9aa8b7;
        --line: #2e3a47;
        --accent: #2dd4bf;
        --accent-strong: #5eead4;
        --danger: #f97066;
        --ok: #3ccb7f;
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: grid;
        grid-template-columns: auto minmax(220px, 1fr) repeat(5, auto);
        gap: 8px;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        z-index: 2;
      }

      .brand {
        min-width: 124px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      button,
      select {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        background: var(--panel);
        font: inherit;
        letter-spacing: 0;
      }

      input {
        min-width: 0;
        padding: 0 10px;
      }

      button,
      select {
        padding: 0 10px;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        color: #ffffff;
        border-color: var(--accent-strong);
        background: var(--accent);
      }

      button:disabled {
        cursor: default;
        opacity: 0.58;
      }

      .content {
        min-height: 0;
        display: grid;
        grid-template-columns: 430px minmax(0, 1fr);
      }

      .sidebar {
        min-height: 0;
        overflow: auto;
        padding: 12px;
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      .browserHint {
        display: grid;
        place-items: center;
        min-height: 0;
        color: var(--muted);
        background: repeating-linear-gradient(45deg, var(--panel-muted), var(--panel-muted) 10px, transparent 10px, transparent 20px);
      }

      body[data-browser-visible="true"] .browserHint {
        visibility: hidden;
      }

      .section {
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .section:last-child {
        border-bottom: 0;
      }

      .sectionTitle {
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
      }

      .statusGrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .metric {
        min-width: 0;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-muted);
      }

      .metricLabel {
        font-size: 11px;
        color: var(--muted);
      }

      .metricValue {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      .state {
        font-weight: 700;
      }

      .state[data-kind="recording"],
      .ok {
        color: var(--ok);
      }

      .state[data-kind="error"],
      .error {
        color: var(--danger);
      }

      .runList {
        display: grid;
        gap: 8px;
      }

      .runCard {
        width: 100%;
        height: auto;
        min-height: 72px;
        display: grid;
        gap: 4px;
        padding: 9px;
        text-align: left;
        border: 1px solid var(--line);
        background: var(--panel-muted);
      }

      .runCard[aria-selected="true"] {
        border-color: var(--accent);
        box-shadow: inset 3px 0 0 var(--accent);
      }

      .runTitle {
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      .runMeta {
        font-size: 12px;
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      pre {
        max-height: 280px;
        overflow: auto;
        margin: 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        background: var(--panel-muted);
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .empty {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--muted);
        background: var(--panel-muted);
      }

      .learnedHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .learnedTitle {
        min-width: 0;
        font-size: 13px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .learnedGrid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 10px;
      }

      .learnedCount {
        min-width: 0;
        padding: 7px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-muted);
      }

      .learnedCount strong {
        display: block;
        font-size: 15px;
      }

      .learnedCount span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .learnedGroup {
        margin-top: 10px;
      }

      .learnedGroupTitle {
        margin-bottom: 5px;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
      }

      .learnedList {
        display: grid;
        gap: 6px;
      }

      .learnedItem {
        min-width: 0;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-muted);
      }

      .learnedItemTitle {
        font-size: 13px;
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      .learnedItemMeta {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 860px) {
        .toolbar {
          grid-template-columns: 1fr 1fr 1fr;
        }

        .brand,
        #targetUrl {
          grid-column: 1 / -1;
        }

        .content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body data-browser-visible="false">
    <div class="app">
      <header class="toolbar">
        <div class="brand">AutoRecipe</div>
        <input id="targetUrl" placeholder="https://example.com or localhost:3000" autocomplete="off" />
        <button id="openBtn" class="primary" type="button">Open</button>
        <button id="startBtn" type="button">Start</button>
        <button id="stopBtn" type="button" disabled>Stop</button>
        <button id="toggleBrowserBtn" type="button">Browser</button>
        <select id="themeSelect" aria-label="Theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </header>
      <main class="content">
        <aside class="sidebar">
          <section class="section">
            <div class="sectionTitle">Runtime</div>
            <div class="statusGrid">
              <div class="metric">
                <div class="metricLabel">Capture</div>
                <div id="captureState" class="metricValue state" data-kind="standby">standby</div>
              </div>
              <div class="metric">
                <div class="metricLabel">CDP</div>
                <div id="cdpEndpoint" class="metricValue">-</div>
              </div>
              <div class="metric">
                <div class="metricLabel">Current URL</div>
                <div id="currentUrl" class="metricValue">-</div>
              </div>
              <div class="metric">
                <div class="metricLabel">Workspace</div>
                <div id="workspaceRoot" class="metricValue">-</div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="sectionTitle">Latest Runs</div>
            <div id="runList" class="runList"></div>
          </section>

          <section class="section">
            <div class="learnedHeader">
              <div class="sectionTitle">Learned</div>
              <button id="openRunDirBtn" type="button" disabled>Open Folder</button>
            </div>
            <div id="learnedPanel"></div>
          </section>

          <section class="section">
            <div class="sectionTitle">Inspector</div>
            <pre id="inspectorOutput">{}</pre>
          </section>

          <section class="section">
            <div class="sectionTitle">Log</div>
            <pre id="logOutput"></pre>
          </section>
        </aside>
        <section class="browserHint">Open a page, then start capture.</section>
      </main>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
